<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Configuration Planner</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #5d6971;
      --line: #dce1e5;
      --accent: #1d6f5f;
      --accent-2: #275c9d;
      --warn: #9a5b00;
      --bad: #9f2d20;
      --good: #1d6f5f;
      --shadow: 0 10px 24px rgba(23, 32, 38, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      max-width: 1800px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      min-height: 38px;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 700;
    }

    button:hover {
      filter: brightness(0.98);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px 16px 0;
    }

    .panel-body {
      padding: 16px;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    input[type="number"], input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      background: white;
      color: var(--ink);
    }

    input[type="file"] {
      width: 100%;
      border: 1px dashed var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfc;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86rem;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      padding: 0 16px;
      overflow-x: auto;
    }

    .tab {
      border: 0;
      border-bottom: 3px solid transparent;
      border-radius: 0;
      min-height: 44px;
      background: transparent;
      white-space: nowrap;
      color: var(--muted);
    }

    .tab.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
      font-weight: 800;
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .metric strong {
      font-size: 1.25rem;
    }

    .table-wrap {
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #fbfcfc;
      position: sticky;
      top: 0;
    }

    td.num, th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    th:nth-child(3), td:nth-child(3) {
      min-width: 230px;
    }

    th:nth-child(8), td:nth-child(8) {
      min-width: 220px;
      width: 22%;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 9px;
      background: #e9f5f2;
      color: var(--good);
      font-weight: 800;
      font-size: 0.78rem;
      margin-right: 5px;
      margin-bottom: 4px;
      max-width: 100%;
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }

    .pill.warn {
      background: #fff4df;
      color: var(--warn);
    }

    .pill.bad {
      background: #fdebe8;
      color: var(--bad);
    }

    .small {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .check-field {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
      padding-top: 22px;
    }

    .check-field input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--accent);
    }

    .check-field label {
      margin: 0;
    }

    .scenario-summary {
      padding: 0 16px 14px;
    }

    .timeline {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid var(--line);
    }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 76px;
      gap: 10px;
      align-items: center;
      font-size: 0.84rem;
    }

    .bar-track {
      height: 14px;
      border-radius: 999px;
      background: #eceff1;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      min-width: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .empty {
      padding: 22px 16px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    @media (max-width: 1450px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 980px) {
      main { padding: 18px; }
      header, .status { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }

    @media (max-width: 620px) {
      .grid { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Project Configuration Planner</h1>
        <p>Load delivery work, role types, skills, and standing meetings, then compare valid staffing mixes by duration, wrap-around, burn, and total cost.</p>
      </div>
      <div class="actions">
        <button id="loadSamples">Load sample data</button>
        <button id="exportCsv">Export scenarios</button>
        <button id="run" class="primary">Run scenarios</button>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2>Inputs</h2>
        </div>
        <div class="panel-body stack">
          <div class="grid">
            <div class="field">
              <label for="weeklyHours">Working hours/week</label>
              <input id="weeklyHours" type="number" min="10" max="80" value="37.5" step="0.5">
            </div>
            <div class="field">
              <label for="hoursPerDay">Hours/day for estimates</label>
              <input id="hoursPerDay" type="number" min="1" max="12" value="7.5" step="0.5">
            </div>
            <div class="field">
              <label for="currency">Currency symbol</label>
              <input id="currency" type="text" value="£" maxlength="3">
            </div>
            <div class="field">
              <label for="discoveryWeeks">Discovery weeks</label>
              <input id="discoveryWeeks" type="number" min="0" value="3" step="0.5">
            </div>
            <div class="field">
              <label for="sitWeeks">SIT weeks</label>
              <input id="sitWeeks" type="number" min="0" value="3" step="0.5">
            </div>
            <div class="field">
              <label for="uatWeeks">UAT weeks</label>
              <input id="uatWeeks" type="number" min="0" value="3" step="0.5">
            </div>
            <div class="field">
              <label for="goliveWeeks">Go-live weeks</label>
              <input id="goliveWeeks" type="number" min="0" value="1" step="0.5">
            </div>
            <div class="field">
              <label for="maxBudget">Max budget</label>
              <input id="maxBudget" type="text" inputmode="decimal" value="" placeholder="No limit" title="Leave blank for no budget limit">
            </div>
            <div class="field">
              <label for="maxProjectWeeks">Max project weeks</label>
              <input id="maxProjectWeeks" type="text" inputmode="decimal" value="" placeholder="No limit" title="Leave blank for no duration limit">
            </div>
            <div class="field">
              <label for="preferredTeamSize">Preferred team size</label>
              <input id="preferredTeamSize" type="text" inputmode="numeric" value="" placeholder="No preference" title="Favours scenarios at or near this team size without excluding others">
            </div>
            <div class="field">
              <label for="maxTeamSize">Max team size</label>
              <input id="maxTeamSize" type="text" inputmode="numeric" value="" placeholder="No limit" title="Excludes scenarios larger than this team size">
            </div>
            <div class="field">
              <label for="maxScenarios">Max output scenarios</label>
              <input id="maxScenarios" type="number" min="1" max="500" value="20" step="1">
            </div>
            <div class="check-field">
              <input id="noIdleTime" type="checkbox">
              <label for="noIdleTime" title="Excludes scenarios with less than 68% build utilization">Do not allow idle time</label>
            </div>
          </div>

          <div class="field">
            <label for="workFile">Technical work CSV</label>
            <input id="workFile" type="file" accept=".csv,text/csv">
          </div>
          <div class="field">
            <label for="rolesFile">Roles and skills CSV</label>
            <input id="rolesFile" type="file" accept=".csv,text/csv">
          </div>
          <div class="field">
            <label for="meetingsFile">Standing meetings CSV</label>
            <input id="meetingsFile" type="file" accept=".csv,text/csv">
          </div>
        </div>
      </aside>

      <section class="panel">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="results" type="button">Results</button>
          <button class="tab" data-tab="work" type="button">Work CSV</button>
          <button class="tab" data-tab="roles" type="button">Roles CSV</button>
          <button class="tab" data-tab="meetings" type="button">Meetings CSV</button>
        </div>

        <div id="results" class="tab-pane active">
          <div class="panel-body">
            <div class="status" id="metrics"></div>
          </div>
          <div class="scenario-summary small" id="scenarioSummary"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Scenario</th>
                  <th class="num">Team size</th>
                  <th>Staffing mix</th>
                  <th class="num">Build weeks</th>
                  <th class="num">Total project weeks</th>
                  <th class="num">Weekly burn</th>
                  <th class="num">Total cost</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody id="scenarioBody"></tbody>
            </table>
          </div>
          <div class="timeline" id="timeline"></div>
        </div>

        <div id="work" class="tab-pane">
          <div class="panel-body field">
            <label for="workCsv">Technical work: id,name,estimate_days,skills,dependencies</label>
            <textarea id="workCsv"></textarea>
          </div>
        </div>

        <div id="roles" class="tab-pane">
          <div class="panel-body field">
            <label for="rolesCsv">Roles: role,role_family,staffing,count,min_count,max_count,daily_rate,build_contribution_pct,skills,inherits</label>
            <textarea id="rolesCsv"></textarea>
          </div>
        </div>

        <div id="meetings" class="tab-pane">
          <div class="panel-body field">
            <label for="meetingsCsv">Standing meetings: meeting,phase,frequency,duration_hours,attendees</label>
            <textarea id="meetingsCsv"></textarea>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const sampleWork = `id,name,estimate_days,skills,dependencies
CFG-CORE,Core product configuration,20,configuration,
CFG-WORKFLOW,Workflow configuration,18,configuration,
CFG-PORTAL,Portal configuration,16,configuration,
INT-API,API integration,24,integration,
INT-BATCH,Batch interfaces,14,integration,
INT-TOOL,Integration tool configuration,12,integration_tool,INT-API
MKT-TOOL,Marketing tool configuration,10,marketing_tool,CFG-CORE
DATA-MAP,Data mapping,12,data,
DATA-MIG,Data migration build,18,data,DATA-MAP
REPORTING,Reporting build,16,data,
SEC-ROLES,Security roles,8,security,CFG-CORE
INT-E2E,End-to-end integration,10,integration,"INT-TOOL;MKT-TOOL;CFG-CORE;DATA-MIG"
TEST-PREP,Test preparation,8,testing,"CFG-CORE;INT-API;DATA-MIG"
FIXES,Defect fixes and hardening,10,"testing;configuration","INT-E2E;TEST-PREP;SEC-ROLES;CFG-WORKFLOW;CFG-PORTAL;INT-BATCH;REPORTING"`;

    const sampleRoles = `role,role_family,staffing,count,min_count,max_count,daily_rate,build_contribution_pct,skills,inherits
Project Manager,leadership,fixed,1,,,840,0,,
Technical Lead,leadership,fixed,1,,,1300,25,"configuration;integration;security",
General Developer,developer,variable,,1,3,1040,100,"configuration;data;testing",
Integration Developer,developer,variable,,0,2,1300,100,"integration;integration_tool",General Developer
General Consultant,consultant,variable,,0,1,1120,100,"configuration;data;testing",
Marketing Tool Consultant,consultant,variable,,0,1,1360,100,"marketing_tool",General Consultant`;

    const sampleMeetings = `meeting,phase,frequency,duration_hours,attendees
Daily stand-up,build,daily,0.25,All
Weekly demo,build,weekly,1.5,All
Planning and RAID,all,weekly,1,"Project Manager;Technical Lead"
Design authority,discovery,weekly,1.5,Technical Lead
SIT triage,sit,daily,0.5,All
UAT triage,uat,daily,0.5,All
Go-live checkpoint,go-live,daily,0.75,All`;

    const state = {
      scenarios: [],
      tasks: [],
      roles: [],
      meetings: [],
      selectionMessage: ""
    };

    const el = (id) => document.getElementById(id);

    function splitList(value) {
      if (!value) return [];
      return String(value)
        .split(/[;,]/)
        .map((item) => item.trim().toLowerCase())
        .filter(Boolean);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      const source = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");

      for (let i = 0; i < source.length; i += 1) {
        const char = source[i];
        const next = source[i + 1];
        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if (char === "\n" && !quoted) {
          row.push(cell);
          if (row.some((part) => part.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      row.push(cell);
      if (row.some((part) => part.trim() !== "")) rows.push(row);
      if (rows.length < 2) return [];

      const headers = rows[0].map((header) => header.trim().toLowerCase().replace(/\s+/g, "_"));
      return rows.slice(1).map((parts) => {
        const record = {};
        headers.forEach((header, index) => {
          record[header] = (parts[index] || "").trim();
        });
        return record;
      });
    }

    function parseNumber(value, fallback = 0) {
      const normalized = String(value ?? "").replace(/[^0-9.-]/g, "");
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function normalizeBudgetInput() {
      const input = el("maxBudget");
      const cleaned = input.value.replace(/[^0-9,.]/g, "");
      const [integerPart, ...decimalParts] = cleaned.split(".");
      const decimals = decimalParts.join("").slice(0, 2);
      input.value = integerPart + (decimalParts.length ? `.${decimals}` : "");
    }

    function normalizePhase(phase) {
      const clean = String(phase || "all").trim().toLowerCase();
      if (["go live", "golive", "go-live"].includes(clean)) return "go-live";
      return clean || "all";
    }

    function meetingHoursPerWeek(meetings, phase, roleName, roleFamily = "") {
      const targetRole = String(roleName || "").trim().toLowerCase();
      const targetFamily = String(roleFamily || "").trim().toLowerCase();
      return meetings.reduce((total, meeting) => {
        const phases = splitList(meeting.phase || "all").map(normalizePhase);
        if (!phases.includes("all") && !phases.includes(phase)) return total;

        const attendees = splitList(meeting.attendees || "all");
        const attends = attendees.includes("all") ||
          attendees.includes(targetFamily) || attendees.includes(`${targetFamily}s`) ||
          (["developer", "consultant"].includes(targetFamily) && attendees.some((item) => ["consultant/developer", "consultants/devs", "delivery team"].includes(item))) ||
          attendees.includes(targetRole);
        if (!attends) return total;

        const duration = parseNumber(meeting.duration_hours, 0);
        const frequency = String(meeting.frequency || "weekly").trim().toLowerCase();
        const multiplier = frequency === "daily" ? 5 : frequency === "fortnightly" ? 0.5 : frequency === "monthly" ? 0.25 : 1;
        return total + duration * multiplier;
      }, 0);
    }

    function loadInputs() {
      const tasks = parseCsv(el("workCsv").value).map((row, index) => ({
        id: row.id || `TASK-${index + 1}`,
        name: row.name || row.item || row.id || `Task ${index + 1}`,
        estimateDays: parseNumber(row.estimate_days || row.days || row.estimate || row.effort_days, 0),
        skills: splitList(row.skills || row.skillset || row.skillsets || row.required_skills),
        dependencies: splitList(row.dependencies || row.depends_on || row.deps),
      })).filter((task) => task.estimateDays > 0);

      const roles = parseCsv(el("rolesCsv").value).map((row) => {
        const staffing = String(row.staffing || row.count_type || "fixed").trim().toLowerCase();
        const fixedCount = Math.max(0, Math.floor(parseNumber(row.count || row.fte, 1)));
        const minCount = staffing === "variable" ? Math.max(0, Math.floor(parseNumber(row.min_count, 0))) : fixedCount;
        const maxCount = staffing === "variable" ? Math.max(minCount, Math.floor(parseNumber(row.max_count, minCount))) : fixedCount;
        const dailyRate = parseNumber(row.daily_rate || row.day_rate || row.cost_per_day, 0);
        const legacyWeeklyCost = parseNumber(row.weekly_cost || row.weekly_rate || row.cost_per_week, 0);
        return {
          role: row.role || row.name || "Role",
          family: String(row.role_family || row.family || row.category || "").trim().toLowerCase(),
          staffing,
          count: fixedCount,
          minCount,
          maxCount,
          dailyRate: dailyRate || legacyWeeklyCost / 5,
          weeklyCost: dailyRate ? dailyRate * 5 : legacyWeeklyCost,
          buildContributionPct: Math.max(0, parseNumber(row.build_contribution_pct || row.build_capacity_pct || row.delivery_pct, 0)),
          ownSkills: splitList(row.skills || row.skillset || row.skillsets),
          inherits: String(row.inherits || row.inherits_from || "").trim()
        };
      });

      const rolesByName = new Map(roles.map((role) => [role.role.toLowerCase(), role]));
      function inheritedSkills(role, seen = new Set()) {
        const key = role.role.toLowerCase();
        if (seen.has(key)) return role.ownSkills;
        seen.add(key);
        const parent = rolesByName.get(role.inherits.toLowerCase());
        return [...new Set([...role.ownSkills, ...(parent ? inheritedSkills(parent, seen) : [])])];
      }
      roles.forEach((role) => { role.skills = inheritedSkills(role); });

      const meetings = parseCsv(el("meetingsCsv").value).map((row) => ({
        meeting: row.meeting || row.name || "Meeting",
        phase: row.phase || "all",
        frequency: row.frequency || "weekly",
        duration_hours: row.duration_hours || row.hours || row.duration || 0,
        attendees: row.attendees || row.roles || "All"
      }));

      state.tasks = tasks;
      state.roles = roles;
      state.meetings = meetings;
      return { tasks, roles, meetings };
    }

    function makeResources(roles, meetings) {
      const weeklyHours = parseNumber(el("weeklyHours").value, 37.5);
      const resources = [];

      roles.forEach((role) => {
        if (role.buildContributionPct <= 0 || role.count <= 0) return;
        const meetingHours = meetingHoursPerWeek(meetings, "build", role.role, role.family);
        const weeklyAvailable = Math.max(0, weeklyHours - meetingHours) * (role.buildContributionPct / 100);
        for (let i = 0; i < role.count; i += 1) {
          resources.push({
            id: `${role.role}-${i + 1}`,
            name: role.role,
            skills: role.skills,
            dailyHours: Math.max(0.1, weeklyAvailable / 5),
            nextFree: 0,
            worked: 0,
            family: role.family
          });
        }
      });

      return resources;
    }

    function canDo(resource, task) {
      if (!task.skills.length) return true;
      return task.skills.every((skill) => resource.skills.includes(skill));
    }

    function taskPriority(tasks) {
      const byId = new Map(tasks.map((task) => [task.id.toLowerCase(), task]));
      const memo = new Map();
      function walk(task) {
        const key = task.id.toLowerCase();
        if (memo.has(key)) return memo.get(key);
        const children = tasks.filter((candidate) => candidate.dependencies.includes(key));
        const downstream = children.length ? Math.max(...children.map(walk)) : 0;
        const total = task.estimateDays + downstream;
        memo.set(key, total);
        return total;
      }
      tasks.forEach(walk);
      return memo;
    }

    function scheduleBuild(tasks, roles, meetings) {
      if (!tasks.length) return { buildWeeks: 0, utilization: 0, resources: [], completed: new Map(), unscheduled: [] };
      const hoursPerDay = parseNumber(el("hoursPerDay").value, 7.5);
      const resources = makeResources(roles, meetings);
      const unscheduled = [...tasks];
      const completed = new Map();
      const priorities = taskPriority(tasks);
      let guard = 0;

      while (unscheduled.length && guard < 2000) {
        guard += 1;
        const ready = unscheduled
          .filter((task) => task.dependencies.every((dep) => completed.has(dep)))
          .sort((a, b) => (priorities.get(b.id.toLowerCase()) || 0) - (priorities.get(a.id.toLowerCase()) || 0));

        if (!ready.length) break;

        let best = null;
        ready.forEach((task) => {
          const depDone = task.dependencies.length ? Math.max(...task.dependencies.map((dep) => completed.get(dep) || 0)) : 0;
          resources.filter((resource) => canDo(resource, task)).forEach((resource) => {
            const start = Math.max(resource.nextFree, depDone);
            if (!best || start < best.start || (start === best.start && resource.dailyHours > best.resource.dailyHours)) {
              best = { task, resource, start };
            }
          });
        });

        if (!best) break;
        const effortHours = best.task.estimateDays * hoursPerDay;
        const durationDays = effortHours / best.resource.dailyHours;
        const finish = best.start + durationDays;
        best.resource.nextFree = finish;
        best.resource.worked += effortHours;
        completed.set(best.task.id.toLowerCase(), finish);
        unscheduled.splice(unscheduled.indexOf(best.task), 1);
      }

      const buildDays = completed.size ? Math.max(...completed.values()) : 0;
      const totalCapacityHours = resources.reduce((total, resource) => total + resource.dailyHours * buildDays, 0);
      const workedHours = resources.reduce((total, resource) => total + resource.worked, 0);
      return {
        buildWeeks: buildDays / 5,
        utilization: totalCapacityHours ? workedHours / totalCapacityHours : 0,
        resources,
        completed,
        unscheduled
      };
    }

    function criticalPathWeeks(tasks) {
      if (!tasks.length) return 0;
      const byId = new Map(tasks.map((task) => [task.id.toLowerCase(), task]));
      const memo = new Map();
      function walk(task) {
        const key = task.id.toLowerCase();
        if (memo.has(key)) return memo.get(key);
        const depMax = task.dependencies
          .map((dep) => byId.get(dep))
          .filter(Boolean)
          .reduce((max, depTask) => Math.max(max, walk(depTask)), 0);
        const total = depMax + task.estimateDays;
        memo.set(key, total);
        return total;
      }
      return Math.max(...tasks.map(walk)) / 5;
    }

    function formatMoney(value) {
      const currency = el("currency").value || "£";
      return `${currency}${Math.round(value).toLocaleString("en-GB")}`;
    }

    function scenarioNotes(scenario, previous, criticalWeeks) {
      const notes = [];
      if (scenario.unscheduled.length) {
        notes.push(`<span class="pill bad">${scenario.missingSkills.length ? `Missing: ${scenario.missingSkills.join(", ")}` : "Blocked or circular dependency"}</span>`);
      }
      if (scenario.utilization < 0.68) notes.push(`<span class="pill warn">Some idle time</span>`);
      if (scenario.buildWeeks <= criticalWeeks * 1.18 && scenario.teamSize > 1) notes.push(`<span class="pill warn">Critical path dominates</span>`);
      if (previous && scenario.teamSize > previous.teamSize && previous.buildWeeks >= scenario.buildWeeks && previous.buildWeeks - scenario.buildWeeks < 1) notes.push(`<span class="pill warn">Limited speed-up</span>`);
      const topSkill = scenario.topSkill;
      if (topSkill && topSkill.share > 0.38) notes.push(`<span class="pill warn">Skill bottleneck in ${topSkill.skill}</span>`);
      if (!notes.length) notes.push(`<span class="pill">Balanced option</span>`);
      return notes.join(" ");
    }

    function topSkillPressure(tasks) {
      const totals = new Map();
      let total = 0;
      tasks.forEach((task) => {
        total += task.estimateDays;
        const skills = task.skills.length ? task.skills : ["general"];
        skills.forEach((skill) => totals.set(skill, (totals.get(skill) || 0) + task.estimateDays / skills.length));
      });
      const entries = [...totals.entries()].sort((a, b) => b[1] - a[1]);
      if (!entries.length || !total) return null;
      return { skill: entries[0][0], share: entries[0][1] / total };
    }

    function roleConfigurations(roles, limit = 500) {
      const variableRoles = roles.filter((role) => role.staffing === "variable");
      const fixedRoles = roles.filter((role) => role.staffing !== "variable");
      const configurations = [];

      function build(index, selected) {
        if (configurations.length >= limit) return;
        if (index === variableRoles.length) {
          configurations.push([
            ...fixedRoles.map((role) => ({ ...role, count: role.count })),
            ...selected
          ]);
          return;
        }
        const role = variableRoles[index];
        for (let count = role.minCount; count <= role.maxCount; count += 1) {
          build(index + 1, [...selected, { ...role, count }]);
        }
      }

      build(0, []);
      return configurations;
    }

    function scenarioLabel(index) {
      let label = "";
      let value = index + 1;
      while (value > 0) {
        value -= 1;
        label = String.fromCharCode(65 + (value % 26)) + label;
        value = Math.floor(value / 26);
      }
      return label;
    }

    function staffingMix(roles) {
      return roles.filter((role) => role.count > 0).map((role) => `${role.count} ${role.role}`).join("; ");
    }

    function dominates(a, b) {
      return a.totalCost <= b.totalCost && a.totalWeeks <= b.totalWeeks &&
        (a.totalCost < b.totalCost || a.totalWeeks < b.totalWeeks);
    }

    function paretoFronts(scenarios) {
      const remaining = [...scenarios];
      const fronts = [];
      while (remaining.length) {
        const front = remaining.filter((candidate) =>
          !remaining.some((other) => other !== candidate && dominates(other, candidate))
        );
        fronts.push(front);
        front.forEach((item) => remaining.splice(remaining.indexOf(item), 1));
      }
      return fronts;
    }

    function diverseSelection(front, count) {
      if (count >= front.length) return front;
      const costs = front.map((item) => item.totalCost);
      const weeks = front.map((item) => item.totalWeeks);
      const minCost = Math.min(...costs);
      const maxCost = Math.max(...costs);
      const minWeeks = Math.min(...weeks);
      const maxWeeks = Math.max(...weeks);
      const normalized = (value, min, max) => max === min ? 0 : (value - min) / (max - min);

      if (count === 1) {
        return [[...front].sort((a, b) =>
          (normalized(a.totalCost, minCost, maxCost) + normalized(a.totalWeeks, minWeeks, maxWeeks)) -
          (normalized(b.totalCost, minCost, maxCost) + normalized(b.totalWeeks, minWeeks, maxWeeks))
        )[0]];
      }

      const scored = front.map((item) => ({ item, distance: 0 }));
      [["totalCost", minCost, maxCost], ["totalWeeks", minWeeks, maxWeeks]].forEach(([key, min, max]) => {
        const ordered = [...scored].sort((a, b) => a.item[key] - b.item[key]);
        ordered[0].distance = Infinity;
        ordered[ordered.length - 1].distance = Infinity;
        if (max === min) return;
        for (let i = 1; i < ordered.length - 1; i += 1) {
          ordered[i].distance += (ordered[i + 1].item[key] - ordered[i - 1].item[key]) / (max - min);
        }
      });
      return scored.sort((a, b) => b.distance - a.distance).slice(0, count).map((entry) => entry.item);
    }

    function selectOptimalScenarios(scenarios, maxCount, preferredTeamSize = null) {
      const selected = [];
      if (preferredTeamSize !== null && scenarios.length) {
        const closestDistance = Math.min(...scenarios.map((scenario) => Math.abs(scenario.teamSize - preferredTeamSize)));
        const closest = scenarios.filter((scenario) => Math.abs(scenario.teamSize - preferredTeamSize) === closestDistance);
        selected.push(...diverseSelection(closest, 1));
      }
      for (const front of paretoFronts(scenarios)) {
        const remaining = maxCount - selected.length;
        if (remaining <= 0) break;
        const unselected = front.filter((scenario) => !selected.includes(scenario));
        selected.push(...diverseSelection(unselected, remaining));
      }
      return selected;
    }

    function runScenarios() {
      const { tasks, roles, meetings } = loadInputs();
      const fixedWeeks = parseNumber(el("discoveryWeeks").value) + parseNumber(el("sitWeeks").value) + parseNumber(el("uatWeeks").value) + parseNumber(el("goliveWeeks").value);
      const criticalWeeks = criticalPathWeeks(tasks);
      const topSkill = topSkillPressure(tasks);
      const generated = [];

      roleConfigurations(roles).forEach((scenarioRoles) => {
        const scheduled = scheduleBuild(tasks, scenarioRoles, meetings);
        const buildWeeks = Math.ceil(scheduled.buildWeeks * 10) / 10;
        const totalWeeks = Math.ceil((fixedWeeks + buildWeeks) * 10) / 10;
        const weeklyBurn = scenarioRoles.reduce((total, role) => total + role.count * role.weeklyCost, 0);
        const missingSkills = [...new Set(scheduled.unscheduled
          .filter((task) => !scheduled.resources.some((resource) => canDo(resource, task)))
          .flatMap((task) => task.skills))];
        generated.push({
          label: scenarioLabel(generated.length),
          teamSize: scenarioRoles.reduce((total, role) => total + role.count, 0),
          mix: staffingMix(scenarioRoles),
          buildWeeks,
          totalWeeks,
          weeklyBurn,
          totalCost: weeklyBurn * totalWeeks,
          utilization: scheduled.utilization,
          unscheduled: scheduled.unscheduled,
          missingSkills,
          topSkill
        });
      });

      const maxBudget = el("maxBudget").value.trim() === "" ? null : parseNumber(el("maxBudget").value, 0);
      const maxProjectWeeks = el("maxProjectWeeks").value.trim() === "" ? null : parseNumber(el("maxProjectWeeks").value, 0);
      const preferredTeamSize = el("preferredTeamSize").value.trim() === "" ? null : Math.max(0, Math.floor(parseNumber(el("preferredTeamSize").value, 0)));
      const maxTeamSize = el("maxTeamSize").value.trim() === "" ? null : Math.max(0, Math.floor(parseNumber(el("maxTeamSize").value, 0)));
      const maxScenarios = Math.max(1, Math.min(500, Math.floor(parseNumber(el("maxScenarios").value, 20))));
      const noIdleTime = el("noIdleTime").checked;
      const withinLimits = generated.filter((scenario) =>
        (maxBudget === null || scenario.totalCost <= maxBudget) &&
        (maxProjectWeeks === null || scenario.totalWeeks <= maxProjectWeeks) &&
        (maxTeamSize === null || scenario.teamSize <= maxTeamSize) &&
        (!noIdleTime || scenario.utilization >= 0.68)
      );
      const feasible = withinLimits.filter((scenario) => !scenario.unscheduled.length);
      let scenarios = selectOptimalScenarios(feasible, maxScenarios, preferredTeamSize);

      if (scenarios.length) {
        const preferenceMessage = preferredTeamSize === null ? "" : ` Preferred team size ${preferredTeamSize} influenced selection.`;
        state.selectionMessage = `${scenarios.length} optimal scenario${scenarios.length === 1 ? "" : "s"} shown from ${generated.length} generated; ${feasible.length} met all constraints.${preferenceMessage}`;
      } else {
        scenarios = withinLimits
          .filter((scenario) => scenario.unscheduled.length)
          .sort((a, b) => a.unscheduled.length - b.unscheduled.length || a.totalCost - b.totalCost)
          .slice(0, maxScenarios);
        const smallestTeamSize = generated.length ? Math.min(...generated.map((scenario) => scenario.teamSize)) : null;
        if (scenarios.length) {
          state.selectionMessage = `No feasible scenarios met all constraints. Showing ${scenarios.length} closest staffing mixes for diagnosis.`;
        } else if (maxTeamSize !== null && smallestTeamSize !== null && smallestTeamSize > maxTeamSize) {
          state.selectionMessage = `No scenarios meet max team size ${maxTeamSize}. The smallest team generated from the fixed and minimum role counts is ${smallestTeamSize}.`;
        } else {
          state.selectionMessage = `No scenarios met the current budget, duration, team-size, and idle-time constraints.`;
        }
      }

      scenarios.sort((a, b) => a.teamSize - b.teamSize || a.totalCost - b.totalCost || a.totalWeeks - b.totalWeeks);
      scenarios.forEach((scenario, index) => { scenario.label = scenarioLabel(index); });

      state.scenarios = scenarios;
      renderResults(scenarios, criticalWeeks);
    }

    function renderMetrics(scenarios) {
      const viable = scenarios.filter((item) => !item.unscheduled.length);
      const bestCost = viable.reduce((best, item) => !best || item.totalCost < best.totalCost ? item : best, null);
      const fastest = viable.reduce((best, item) => !best || item.totalWeeks < best.totalWeeks ? item : best, null);
      const workDays = state.tasks.reduce((total, task) => total + task.estimateDays, 0);
      el("metrics").innerHTML = `
        <div class="metric"><span>Work items</span><strong>${state.tasks.length}</strong></div>
        <div class="metric"><span>Total build effort</span><strong>${workDays.toLocaleString("en-GB")} days</strong></div>
        <div class="metric"><span>Lowest cost</span><strong>${bestCost ? `${bestCost.label} · ${formatMoney(bestCost.totalCost)}` : "n/a"}</strong></div>
        <div class="metric"><span>Fastest</span><strong>${fastest ? `${fastest.label} · ${fastest.totalWeeks} wks` : "n/a"}</strong></div>
      `;
    }

    function renderResults(scenarios, criticalWeeks) {
      renderMetrics(scenarios);
      el("scenarioSummary").textContent = state.selectionMessage || "";
      let previous = null;
      el("scenarioBody").innerHTML = scenarios.map((scenario) => {
        const notes = scenarioNotes(scenario, previous, criticalWeeks);
        previous = scenario;
        return `<tr>
          <td><strong>${scenario.label}</strong></td>
          <td class="num">${scenario.teamSize}</td>
          <td>${scenario.mix}</td>
          <td class="num">${scenario.buildWeeks}</td>
          <td class="num">${scenario.totalWeeks}</td>
          <td class="num">${formatMoney(scenario.weeklyBurn)}</td>
          <td class="num">${formatMoney(scenario.totalCost)}</td>
          <td>${notes}</td>
        </tr>`;
      }).join("");

      if (!scenarios.length) {
        el("scenarioBody").innerHTML = "";
        el("timeline").innerHTML = `<div class="empty">Adjust the constraints to see matching scenarios.</div>`;
        return;
      }

      const maxWeeks = Math.max(...scenarios.map((scenario) => scenario.totalWeeks));
      el("timeline").innerHTML = scenarios.map((scenario) => `
        <div class="bar-row">
          <strong>Scenario ${scenario.label}</strong>
          <div class="bar-track" aria-label="Scenario ${scenario.label} duration">
            <div class="bar-fill" style="width:${Math.max(2, scenario.totalWeeks / maxWeeks * 100)}%"></div>
          </div>
          <span class="small">${scenario.totalWeeks} wks</span>
        </div>
      `).join("");
    }

    function toCsv(scenarios) {
      const rows = [["Scenario", "Team size", "Staffing mix", "Build weeks", "Total project weeks", "Weekly burn", "Total cost"]];
      scenarios.forEach((scenario) => {
        rows.push([scenario.label, scenario.teamSize, scenario.mix, scenario.buildWeeks, scenario.totalWeeks, scenario.weeklyBurn, Math.round(scenario.totalCost)]);
      });
      return rows.map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
    }

    function download(filename, text) {
      const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function readFileInto(inputId, textareaId) {
      const input = el(inputId);
      input.addEventListener("click", () => {
        input.value = "";
      });
      input.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        el(textareaId).value = await file.text();
        runScenarios();
      });
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
        el(tab.dataset.tab).classList.add("active");
      });
    });

    el("loadSamples").addEventListener("click", () => {
      el("workCsv").value = sampleWork;
      el("rolesCsv").value = sampleRoles;
      el("meetingsCsv").value = sampleMeetings;
      runScenarios();
    });

    el("run").addEventListener("click", runScenarios);
    el("exportCsv").addEventListener("click", () => {
      if (!state.scenarios.length) runScenarios();
      download("project-scenarios.csv", toCsv(state.scenarios));
    });

    ["weeklyHours", "hoursPerDay", "currency", "discoveryWeeks", "sitWeeks", "uatWeeks", "goliveWeeks", "maxProjectWeeks", "preferredTeamSize", "maxTeamSize", "maxScenarios"].forEach((id) => {
      el(id).addEventListener("input", runScenarios);
    });

    el("maxBudget").addEventListener("input", () => {
      normalizeBudgetInput();
      runScenarios();
    });

    el("noIdleTime").addEventListener("change", runScenarios);

    ["workCsv", "rolesCsv", "meetingsCsv"].forEach((id) => {
      el(id).addEventListener("input", runScenarios);
    });

    readFileInto("workFile", "workCsv");
    readFileInto("rolesFile", "rolesCsv");
    readFileInto("meetingsFile", "meetingsCsv");

    el("workCsv").value = sampleWork;
    el("rolesCsv").value = sampleRoles;
    el("meetingsCsv").value = sampleMeetings;
    runScenarios();
  </script>
</body>
</html>
